<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f9;
        display: flex;
        justify-content: center;
        padding-top: 50px;
        margin: 0;
        color: #333;
      }

      .main-container {
        background: white;
        padding: 40px;
        border-radius: 20px; /* Matched the image curvature */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 550px;
        overflow: hidden;
      }

      .form-header {
        background-color: #2196f3;
        margin: -40px -40px 30px -40px;
        padding: 20px;
        text-align: center;
        color: white;
      }

      .form-header h1 {
        margin: 0;
        font-size: 24px;
      }

      /* Side-by-side layout for names */
      .name-row {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }

      .label-group {
        display: flex;
        flex-direction: column; /* Changed to match the vertical stack in image */
        margin-bottom: 20px;
        width: 100%;
      }

      label {
        font-weight: bold;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: #556b82;
      }

      input {
        padding: 12px;
        border: 1px solid #ccd6e0;
        border-radius: 6px;
        outline: none;
        font-size: 16px;
      }

      input:focus {
        border-color: #3498db;
      }

      button {
        width: 100%;
        background-color: #2196f3;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 30px; /* Rounder button like image */
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }

      button:hover {
        background-color: #1976d2;
      }

      .error-text {
        color: #c0392b;
        font-size: 0.8rem;
        display: none;
        margin-top: 5px;
      }

      input.invalid {
        border: 2px solid #ff4d4d;
      }

      .footer-msg {
        text-align: center;
        font-size: 0.8rem;
        margin-top: 15px;
        color: #777;
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      <div class="form-header">
        <h1>Registration Form</h1>
      </div>

      <form id="input-form" novalidate>
        <div class="name-row">
          <div class="label-group">
            <label>First Name</label>
            <input id="fName" type="text" placeholder="Enter your First Name" required />
            <span id="fName-error" class="error-text">Letters only.</span>
          </div>

          <div class="label-group">
            <label>Last Name</label>
            <input id="lName" type="text" placeholder="Enter your Last Name" required />
            <span id="lName-error" class="error-text">Letters only.</span>
          </div>
        </div>

        <div class="label-group">
          <label>Date of Birth</label>
          <input id="dob" type="date" required />
          <span id="dob-error" class="error-text">Please enter a valid date.</span>
        </div>

        <div class="label-group">
          <label>Email Address</label>
          <input id="email" type="email" placeholder="Enter your Email" required style="margin-bottom: 10px" />
          <input
            id="confirmEmail"
            type="email"
            placeholder="Confirm Email"
            required/>
          <span id="email-error" class="error-text">Emails do not match.</span>
        </div>

        <div class="label-group">
          <label>Password</label>
          <input
            id="password"
            type="password"
            placeholder="Enter password"
            required
          />
          <span id="password-error" class="error-text"
            >Password must start with a capital letter, include 2 numbers, 1
            special character, and be 8-32 characters.</span
          >
        </div>

        <div class="label-group">
          <label>Confirm Password</label>
          <input
            id="confirmPassword"
            type="password"
            placeholder="Confirm password"
            required
          />
          <span id="passwordConfirm-error" class="error-text"
            >Passwords do not match.</span
          >
        </div>

        <button type="submit">Register</button>
        <p
          id="footer-error"
          class="error-text"
          style="text-align: center; margin-top: 15px"
        >
          Please fix the errors above to submit the form.
        </p>
      </form>
    </div>

    <script>
      const form = document.getElementById("input-form");

      form.addEventListener("submit", function (event) {
        // inputs
        const fNameInput = document.getElementById("fName");
        const lNameInput = document.getElementById("lName");
        const emailInput = document.getElementById("email");
        const dobInput = document.getElementById("dob");
        const confirmEmailInput = document.getElementById("confirmEmail");
        const passwordInput = document.getElementById("password");
        const confirmPassInput = document.getElementById("confirmPassword");

        // errors
        const fNameError = document.getElementById("fName-error");
        const lNameError = document.getElementById("lName-error");
        const emailError = document.getElementById("email-error");
        const dobError = document.getElementById("dob-error");
        const passwordError = document.getElementById("password-error");
        const passConfirmError = document.getElementById(
          "passwordConfirm-error",
        );
        const footerError = document.getElementById("footer-error");

        // Clear past error states
        const allInputs = [
          fNameInput,
          lNameInput,
          emailInput,
          confirmEmailInput,
          dobInput,
          passwordInput,
          confirmPassInput,
        ];
        const allErrors = [
          fNameError,
          lNameError,
          emailError,
          dobError,
          passwordError,
          passConfirmError,
        ];
        footerError.style.display = "none";

        allErrors.forEach((err) => (err.style.display = "none"));
        allInputs.forEach((input) => input.classList.remove("invalid"));

        let isValid = true;
        const namePattern = /^[A-Za-z]+$/; // regex for name
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        // Starts with Capital [A-Z], at least 2 digits, 1 special char, 8-32 length
        const passwordPattern =
          /^(?=[A-Z])(?=.*?\d.*?\d)(?=.*?[!@#$%^&*])(?=.{8,32}$)/;

        // check if First Name is empty and if it contains only letters
        if (!namePattern.test(fNameInput.value)) {
          fNameError.style.display = "block";
          fNameInput.classList.add("invalid");
          isValid = false;
        }

        // check if Last Name is empty and if it contains only letters
        if (!namePattern.test(lNameInput.value)) {
          lNameError.style.display = "block";
          lNameInput.classList.add("invalid");
          isValid = false;
        }

        // check for valid date
        if (dobInput.value === "") {
          dobError.style.display = "block";
          dobInput.classList.add("invalid");
          isValid = false;
        }

        // Email validation and match check
        if (
          !emailPattern.test(emailInput.value) ||
          emailInput.value !== confirmEmailInput.value
        ) {
          emailError.style.display = "block";
          emailInput.classList.add("invalid");
          confirmEmailInput.classList.add("invalid");
          isValid = false;
        }

        // Password complexity check
        if (!passwordPattern.test(passwordInput.value)) {
          passwordError.style.display = "block";
          passwordInput.classList.add("invalid");
          isValid = false;
        }

        // Password match check
        if (passwordInput.value !== confirmPassInput.value) {
          passConfirmError.style.display = "block";
          confirmPassInput.classList.add("invalid");
          isValid = false;
        }

        if (!isValid) {
          footerError.style.display = "block"; // Show the footer message
          event.preventDefault();
          return;
        }

        if (isValid === false) {
          event.preventDefault(); // Stop the submitting
          return;
        }

        event.preventDefault();
        alert("Registration Successful!");
      });
    </script>
  </body>
</html>
