<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasks 1 - 3</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
            color: #333;
        }

        .main-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .label-group {
            display: flex;
            flex-wrap: wrap;
            /* Allows error text to drop to the next line */
            align-items: center;
            margin-bottom: 20px;
        }

        label {
            flex: 1;
            font-weight: bold;
        }

        input {
            flex: 2;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            border-color: #3498db;
        }

        .input-form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button {
            width: 80%;
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
        }

        button:hover {
            background-color: #1976d2;
        }

        hr {
            margin: 30px 0;
            border: 0;
            border-top: 1px solid #eee;
        }

        .output-section p {
            margin: 10px 0;
            color: #555;
        }

        /* task 2 */
        .error-text {
            flex-basis: 100%;
            /* Forces the span to take up the whole row */
            margin-left: 33%;
            color: #ff4d4d;
            font-size: 0.8rem;
            display: none;
            margin-top: 5px;
        }

        input.invalid {
            border: 2px solid #ff4d4d;
        }
    </style>
</head>

<body>
    <!-- main form -->
    <div class="main-container">
        <!-- form = input -->
        <form id="input-form" action="post" novalidate>
            <div class="label-group">
                <label>First Name:</label>
                <input id="fName" type="text" name="name" placeholder="Enter your name" required />
                <span id="fName-error" class="error-text"></span>
            </div>

            <div class="label-group">
                <label>Last Name:</label>
                <input id="lName" type="text" name="name" placeholder="Enter your name" required />
                <span id="lName-error" class="error-text"></span>
            </div>

            <div class="label-group">
                <label>Email:</label>
                <input id="email" type="email" name="email" placeholder="Enter your email" required />
                <span id="email-error" class="error-text"></span>
            </div>

            <div class="label-group">
                <label>Phone number:</label>
                <input id="phone" type="tel" name="phone number" placeholder="Enter your phone number" required />
                <span id="phone-error" class="error-text"></span>
            </div>

            <button type="submit">Submit</button>
        </form>

        <hr />

        <!-- output on html -->
        <div id="output">
            <h4>Submitted Data:</h4>
            <p id="out-fName">First Name:</p>
            <p id="out-lName">Last Name:</p>
            <p id="out-email">Email:</p>
            <p id="out-phone">Phone Number:</p>
        </div>
    </div>

    <script>
        const form = document.getElementById("input-form");

        form.addEventListener("submit", function (event) {
            // input
            const fNameInput = document.getElementById("fName");
            const lNameInput = document.getElementById("lName");
            const emailInput = document.getElementById("email");
            const phoneInput = document.getElementById("phone");

            // error
            const fNameError = document.getElementById("fName-error");
            const lNameError = document.getElementById("lName-error");
            const emailError = document.getElementById("email-error");
            const phoneError = document.getElementById("phone-error");

            // Clear the past error states
            fNameError.style.display = "none";
            fNameInput.classList.remove("invalid");

            lNameError.style.display = "none";
            lNameInput.classList.remove("invalid");

            emailError.style.display = "none";
            emailInput.classList.remove("invalid");

            phoneError.style.display = "none";
            phoneInput.classList.remove("invalid");


            let isValid = true;
            const namePattern = /^[A-Za-z]+$/; // regex for name 
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // regex for email
            const phonePattern = /^\d{10}$/; // regex for phone

            // check if First Name is empty and if it contains only letters
            if (fNameInput.value.trim() === "" || !namePattern.test(fNameInput.value)) {
                fNameError.textContent = "Fisrt name Must contains only letters | First name is required.";
                fNameError.style.display = "block";
                fNameInput.classList.add("invalid");
                isValid = false;
            }

            // check if Last Name is empty and if it contains only letters
            if (lNameInput.value.trim() === "" || !namePattern.test(lNameInput.value)) {
                lNameError.textContent = "Last name Must contains only letters | Last name is required.";
                lNameError.style.display = "block";
                lNameInput.classList.add("invalid");
                isValid = false;
            }

            // Email (check for @ and .)
            // Task 3: Using Regex for Email
            if (!emailPattern.test(emailInput.value.trim())) {
                emailError.textContent = "Please enter a valid email address | Email is required.";
                emailError.style.display = "block";
                emailInput.classList.add("invalid");
                isValid = false;
            }

            // Task 3: Phone number (10 digits, numbers only)
            if (!phonePattern.test(phoneInput.value.trim())) {
                phoneError.textContent = "Phone number must be exactly 10 digits and numbers only.";
                phoneError.style.display = "block";
                phoneInput.classList.add("invalid");
                isValid = false;
            }

            if (isValid === false) {
                event.preventDefault(); // Stop the submitting
                return;
            }
            
            event.preventDefault();

            // show the output
            document.getElementById("out-fName").textContent = "First Name: " + fNameInput.value;
            document.getElementById("out-lName").textContent = "Last Name: " + lNameInput.value;
            document.getElementById("out-email").textContent = "Email: " + emailInput.value;
            document.getElementById("out-phone").textContent = "Phone Number: " + phoneInput.value;
        });
    </script>
</body>

</html>
